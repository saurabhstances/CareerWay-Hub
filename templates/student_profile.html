<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile | CareerWay Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #4F46E5; --secondary: #10B981; --bg: #F3F4F6; --text-dark: #1F2937; }
        body { background-color: var(--bg); font-family: 'Poppins', sans-serif; color: var(--text-dark); }
        .profile-header { background: linear-gradient(135deg, #4F46E5 0%, #3730A3 100%); color: white; padding: 40px 0; margin-bottom: 30px; border-radius: 0 0 30px 30px; box-shadow: 0 4px 20px rgba(79, 70, 229, 0.2); }
        .form-card { background: white; border-radius: 15px; padding: 30px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #E5E7EB; }
        .section-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #F3F4F6; }
        label { font-weight: 500; font-size: 0.9rem; margin-bottom: 6px; color: #4B5563; }
        .mandatory { color: #DC2626; }
        .form-control, .form-select { border-radius: 8px; padding: 10px 15px; }
        .upload-box { border: 2px dashed #D1D5DB; border-radius: 10px; padding: 30px; text-align: center; background: #F9FAFB; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: var(--primary); background: #EEF2FF; }
    </style>
</head>
<body>

    <div class="profile-header text-center">
        <div class="container">
            <h2 class="fw-bold mb-2">Build Your Professional Profile</h2>
            <p class="opacity-75 mb-0">Help our AI match you with the best jobs.</p>
        </div>
    </div>

    <div class="container pb-5">
        <form action="{{ url_for('complete_profile') }}" method="POST" enctype="multipart/form-data">
            
            <div class="row">
                <div class="col-lg-4">
                    <div class="form-card">
                        <div class="section-title"><i class="fas fa-user-circle"></i> Personal Details</div>
                        
                        <div class="mb-3">
                            <label>Full Name <span class="mandatory">*</span></label>
                            <input type="text" class="form-control" name="name" value="{{ user.name }}" readonly style="background-color: #f3f4f6;">
                        </div>
                        
                        <div class="mb-3">
                            <label>Email Address <span class="mandatory">*</span></label>
                            <input type="email" class="form-control" name="email" value="{{ user.email }}" readonly style="background-color: #f3f4f6;">
                        </div>

                        <div class="mb-3">
                            <label>Mobile Number <span class="mandatory">*</span></label>
                            <input type="tel" class="form-control" name="mobile" placeholder="9876543210" value="{{ user.mobile or '' }}" required>
                        </div>

                        <div class="mb-3">
                            <label>Current City <span class="mandatory">*</span></label>
                            <input type="text" class="form-control" name="location" placeholder="e.g. Mumbai" value="{{ user.location or '' }}" required>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="section-title"><i class="fas fa-link"></i> Social Links</div>
                        <div class="mb-3">
                            <label>Portfolio / LinkedIn URL</label>
                            <input type="url" class="form-control" name="portfolio" placeholder="https://..." value="{{ user.portfolio or '' }}">
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    
                    <div class="form-card">
                        <div class="section-title"><i class="fas fa-graduation-cap"></i> Education & Experience</div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Highest Qualification <span class="mandatory">*</span></label>
                                <select class="form-select" name="degree" required>
                                    <option value="" disabled {% if not user.degree %}selected{% endif %}>Select Degree</option>
                                    <option value="B.Tech/B.E." {% if user.degree == 'B.Tech/B.E.' %}selected{% endif %}>B.Tech / B.E.</option>
                                    <option value="B.Sc" {% if user.degree == 'B.Sc' %}selected{% endif %}>B.Sc</option>
                                    <option value="BCA" {% if user.degree == 'BCA' %}selected{% endif %}>BCA</option>
                                    <option value="MCA" {% if user.degree == 'MCA' %}selected{% endif %}>MCA</option>
                                    <option value="MBA" {% if user.degree == 'MBA' %}selected{% endif %}>MBA</option>
                                    <option value="Diploma" {% if user.degree == 'Diploma' %}selected{% endif %}>Diploma</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Specialization <span class="mandatory">*</span></label>
                                <input type="text" class="form-control" name="specialization" placeholder="e.g. Computer Science" value="{{ user.specialization or '' }}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Passing Year <span class="mandatory">*</span></label>
                                <select class="form-select" name="year" required>
                                    <option value="" disabled {% if not user.passing_year %}selected{% endif %}>Select Year</option>
                                    {% for y in range(2030, 2015, -1) %}
                                        <option value="{{ y }}" {% if user.passing_year == y|string %}selected{% endif %}>{{ y }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Work Experience <span class="mandatory">*</span></label>
                                <select class="form-select" name="experience" required>
                                    <option value="Fresher" {% if user.experience == 'Fresher' %}selected{% endif %}>Fresher</option>
                                    <option value="0-1 Year" {% if user.experience == '0-1 Year' %}selected{% endif %}>0-1 Year</option>
                                    <option value="1-3 Years" {% if user.experience == '1-3 Years' %}selected{% endif %}>1-3 Years</option>
                                    <option value="3-5 Years" {% if user.experience == '3-5 Years' %}selected{% endif %}>3-5 Years</option>
                                    <option value="5+ Years" {% if user.experience == '5+ Years' %}selected{% endif %}>5+ Years</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="section-title"><i class="fas fa-brain"></i> Key Skills</div>
                        <div class="mb-3">
                            <label>Primary Skills <span class="mandatory">*</span></label>
                            <input type="text" class="form-control" name="skills" list="tech_skills" 
                                   placeholder="e.g. Python, Java, SQL" value="{{ user.skills or '' }}" required>
                            <div class="form-text">Used by AI for job matching.</div>
                            <datalist id="tech_skills">
                                <option value="Python"><option value="Java"><option value="SQL">
                                <option value="React.js"><option value="Data Analysis"><option value="AWS">
                            </datalist>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="section-title"><i class="fas fa-briefcase"></i> Preferences</div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Preferred Role</label>
                                <input type="text" class="form-control" name="target_role" placeholder="e.g. Data Scientist" value="{{ user.target_role or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Work Mode</label>
                                <select class="form-select" name="work_mode">
                                    <option value="Any" {% if user.work_mode == 'Any' %}selected{% endif %}>Any</option>
                                    <option value="Remote" {% if user.work_mode == 'Remote' %}selected{% endif %}>Remote</option>
                                    <option value="On-site" {% if user.work_mode == 'On-site' %}selected{% endif %}>On-site</option>
                                    <option value="Hybrid" {% if user.work_mode == 'Hybrid' %}selected{% endif %}>Hybrid</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="section-title"><i class="fas fa-file-pdf"></i> Resume</div>
                        {% if user.resume_filename %}
                            <div class="alert alert-success d-flex align-items-center">
                                <i class="fas fa-check-circle me-2"></i>
                                <div>
                                    <strong>Resume Uploaded</strong><br>
                                    <small>{{ user.resume_filename }}</small>
                                </div>
                            </div>
                        {% endif %}
                        <div class="upload-box" onclick="document.getElementById('resumeFile').click()">
                            <i class="fas fa-cloud-upload-alt fa-2x text-muted mb-2"></i>
                            <p class="mb-0">Click to Update Resume</p>
                            <input type="file" name="resume" id="resumeFile" style="display:none;" onchange="alert('File Selected: ' + this.files[0].name)">
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">Save Profile</button>
                    </div>

                </div>
            </div>
        </form>
    </div>
</body>
</html>
