<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CareerWay Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Background Shapes */
        .shape { position: absolute; border-radius: 50%; filter: blur(50px); opacity: 0.6; z-index: -1; }
        .shape-1 { width: 400px; height: 400px; background: #bfdbfe; top: -100px; left: -100px; animation: float 6s infinite; }
        .shape-2 { width: 300px; height: 300px; background: #e9d5ff; bottom: -50px; right: -50px; animation: float 8s infinite reverse; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .auth-card {
            background: white; padding: 40px; width: 100%; max-width: 400px;
            border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid white;
            z-index: 1;
        }

        .brand-text { font-weight: 800; color: #1e293b; letter-spacing: -0.5px; }
        
        .form-floating .form-control { border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; }
        .form-floating .form-control:focus { background: white; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        
        .btn-primary-custom {
            background: #2563eb; color: white; padding: 12px; width: 100%; border-radius: 12px;
            font-weight: 600; border: none; margin-top: 10px; transition: 0.2s;
        }
        .btn-primary-custom:hover { background: #1d4ed8; box-shadow: 0 5px 15px rgba(37,99,235,0.3); }

        .btn-google {
            background: white; border: 1px solid #e2e8f0; color: #374151; width: 100%;
            padding: 10px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-weight: 500; transition: 0.2s;
        }
        .btn-google:hover { background: #f8fafc; border-color: #cbd5e1; }

        /* 🔥 GUEST BUTTON STYLE 🔥 */
        .btn-guest {
            background: transparent; color: #64748b; padding: 10px; width: 100%; border-radius: 12px;
            font-weight: 600; border: 1px dashed #cbd5e1; margin-top: 15px; transition: 0.2s;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none;
        }
        .btn-guest:hover { background: #f8fafc; border-color: #94a3b8; color: #1e293b; }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <nav class="navbar fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">CareerWay Hub</a>
            <a href="{{ url_for('register') }}" class="btn btn-sm btn-outline-primary rounded-pill px-3 {% if request.endpoint == 'login' %}d-none{% endif %}">Register</a>
        </div>
    </nav>

    <div class="auth-card animate__animated animate__zoomIn">
        <div class="text-center mb-4">
            <h2 class="brand-text">Welcome Back</h2>
            <p class="text-muted small">Enter your credentials to access your dashboard.</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-floating mb-3">
                <input type="email" name="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                <label for="emailInput">Email Address</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" name="password" class="form-control" id="passInput" placeholder="Password" required>
                <label for="passInput">Password</label>
            </div>

            <button type="submit" class="btn-primary-custom">Sign In</button>
            
            <div class="d-flex justify-content-between mt-3 mb-4 small">
                <a href="#" class="text-decoration-none text-muted">Forgot Password?</a>
                <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold text-primary">Create Account</a>
            </div>

            <div class="text-center position-relative mb-4">
                <hr class="text-muted">
                <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted small">OR</span>
            </div>

            <a href="/login/google" class="text-decoration-none">
                <button type="button" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" width="20">
                    Continue with Google
                </button>
            </a>

            <a href="{{ url_for('dashboard') }}" class="btn-guest">
                <i class="fa-solid fa-compass"></i> Skip Login as Guest
            </a>
        </form>
    </div>

</body>
</html>
