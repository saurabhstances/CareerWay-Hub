<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Gateway | CareerWay Admin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg-obsidian: #020617;
            --cyber-blue: #38bdf8;
            --cyber-purple: #818cf8;
            --fire-glow: #4f46e5;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-obsidian);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #f8fafc;
            margin: 0;
        }

        /* --- 🔥 DYNAMIC NEON AMBIANCE --- */
        .glow-overlay {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(79, 70, 229, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(56, 189, 248, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        /* --- 🔥 ANIMATED CARD CONTAINER --- */
        .admin-wrapper {
            position: relative;
            padding: 3px; /* Border thickness */
            border-radius: 32px;
            background: linear-gradient(135deg, var(--fire-glow), var(--cyber-blue), var(--cyber-purple));
            background-size: 300% 300%;
            animation: gradientBorder 6s ease infinite;
        }

        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .admin-card {
            background: #0f172a;
            padding: 45px 40px;
            width: 100%;
            max-width: 420px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* --- SECURITY HEADER --- */
        .auth-badge {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .auth-badge i { font-size: 0.5rem; }

        .brand-icon {
            font-size: 2.5rem;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .title { font-weight: 800; font-size: 1.75rem; letter-spacing: -1px; margin-bottom: 8px; }
        .subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 35px; }

        /* --- CUSTOM INPUTS --- */
        .field-container {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .field-container label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #475569;
            text-transform: uppercase;
            margin-left: 12px;
            margin-bottom: 6px;
            display: block;
        }

        .form-control-cyber {
            background: rgba(2, 6, 23, 0.5) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 16px !important;
            padding: 14px 18px 14px 45px !important;
            color: white !important;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control-cyber:focus {
            border-color: var(--fire-glow) !important;
            background: rgba(2, 6, 23, 0.8) !important;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.2) !important;
        }

        .field-container i {
            position: absolute;
            left: 18px;
            bottom: 16px;
            color: #475569;
            transition: 0.3s;
        }

        .form-control-cyber:focus + i { color: var(--cyber-blue); }

        /* --- FIRE SUBMIT BUTTON --- */
        .btn-auth {
            background: var(--fire-glow);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 15px;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5);
        }

        .btn-auth:hover {
            background: #4338ca;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(79, 70, 229, 0.6);
        }

        .btn-auth:active { transform: translateY(-1px); }

        /* --- FOOTER LINK --- */
        .footer-link {
            display: inline-block;
            margin-top: 30px;
            color: #475569;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .footer-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="glow-overlay"></div>

    <div class="admin-wrapper animate__animated animate__zoomIn">
        <div class="admin-card">
            
            <div class="auth-badge">
                <i class="fa-solid fa-circle animate__animated animate__flash animate__infinite"></i>
                Gateway Token Required
            </div>

            <i class="fa-solid fa-user-lock brand-icon"></i>
            <h2 class="title">Admin Login</h2>
            <p class="subtitle">Secure session initialization</p>

            <form action="{{ url_for('process_admin') }}" method="POST">
                
                <div class="field-container">
                    <label>Identifier</label>
                    <input type="text" name="admin_id" class="form-control-cyber form-control" placeholder="Admin UID" required autocomplete="off">
                    <i class="fa-solid fa-fingerprint"></i>
                </div>
                
                <div class="field-container">
                    <label>Access Token</label>
                    <input type="password" name="admin_pwd" class="form-control-cyber form-control" placeholder="••••••••" required>
                    <i class="fa-solid fa-shield-halved"></i>
                </div>

                <button type="submit" class="btn-auth">
                    Grant Access <i class="fa-solid fa-arrow-right-long"></i>
                </button>
            </form>

            <a href="{{ url_for('dashboard') }}" class="footer-link">
                <i class="fa-solid fa-chevron-left me-2"></i> Return to CareerWay Hub
            </a>
        </div>
    </div>

</body>
</html>
